<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'>
        <title>{{ title }}</title>
    <link rel="stylesheet" href="{{url_for('static', filename='css/style.css')}}">
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    </head>

    <body>
        <div style="display: flex; justify-content: space-between; align-items: baseline;">
            <h1>Миссия Колонизация Марса</h1>
            <span>
                {% if current_user.is_authenticated %}
                    {{ current_user.surname }} {{ current_user.name }}
                    | <a href="/logout">Выйти</a>
                {% else %}
                    <a href="/login">Войти</a>
                {% endif %}
            </span>
        </div>

        <h3>И на Марсе будут яблони цвести!</h3>

        <main role='main' class='container'>
            {% block content %}{% endblock %}
        </main>
    </body>
</html>
