{% extends "base.html" %}

{% block content %}

<h2>{{ title }}</h2>

{% if message %}
    <p style="color: red;">{{ message }}</p>
{% endif %}

<form method="post">
    <p>
        <label>Category name<br>
        <input type="text" name="name" value="{{ name or '' }}"></label>
    </p>
    <button type="submit">Submit</button>
</form>

{% endblock %}
