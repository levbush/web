{% extends "base.html" %}

{% block content %}

<div style="text-align: center;">
    <h2>Nostalgy</h2>
    <h3>{{ user.name }} {{ user.surname }}</h3>
    <h4>Hometown {{ user.city_from }}</h4>

    {% if map_url %}
        <img src="{{ map_url }}" alt="Map of {{ user.city_from }}"
             style="max-width: 700px; width: 100%; border: 1px solid #ccc;">
    {% else %}
        <p style="color: red;">Could not load map for "{{ user.city_from }}".</p>
    {% endif %}
</div>

{% endblock %}
